<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="https://img.icons8.com/stickers/1200/shop--v1.jpg"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__top">
        <nav class="header__nav">
          <ul class="header__listbox">
            <li class="header__content">BRAND</li>
            <li class="header__content">EVENT</li>
            <li class="header__content">LOOKBOOK</li>
            <li class="header__content">COMMUNITY</li>
          </ul>
        </nav>
        <!-- 왼쪽 상단 네비게이션 -->

        <h1 class="header__title">SENDWISH</h1>
        <!-- 웹사이트 로고 -->

        <ul class="header__menu">
          <li class="header__content">
            <i class="fa-solid fa-magnifying-glass fa-lg"></i>
            <!-- 돋보기(search) -->
          </li>

          <li class="header__content header__point-badge">
            <div class="header__point">
              <span class="header__point-badge"> +2000P </span>
            </div>
            <a href="/login.html"><i class="fa-solid fa-user fa-lg"></i></a>
            <!-- 유저(프로필) -->
          </li>

          <li class="header__content header__content--badge-box">
            <div class="header__cart-badge">
              <span>2</span>
            </div>

            <i class="fa-solid fa-basket-shopping fa-lg"></i>
            <!-- 장바구니 -->
          </li>

          <li class="header__content">
            <i class="fa-solid fa-bars fa-lg"></i>
            <!-- 햄버거 메뉴 -->
          </li>
        </ul>
        <!-- ---------오른쪽 아이콘 모음 --------- -->
      </div>
      <!-- 위 헤더 -->

      <div class="header__bottom">
        <ul class="header__category">
          <li class="header__content">BEST</li>
          <li class="header__content">NEW5%</li>
          <li class="header__content">1+1</li>
          <li class="header__content">OUTER</li>
          <li class="header__content">TOP</li>
          <li class="header__content">SHIRTS</li>
          <li class="header__content">DRESS</li>
          <li class="header__content">PANTS</li>
          <li class="header__content">ACC</li>
        </ul>
      </div>
    </header>
    <div class="login-wrapper">
      <h2 class="login__title">로그인</h2>
      <span class="login__text"> 아이디와 비밀번호 입력하기 귀찮으시죠? </span>
      <span class="login__text"> 카카오로 1초만에 로그인하세요. </span>
      <button class="login__btn login__btn--kakako">카카오 1초 로그인</button>
      <form class="login__form">
        <label for="login-id">
          <span class="login__text">아이디</span>
          <input class="login__input" id="login-id" type="text" />
        </label>
        <!--  -->
        <label for="login-password">
          <span class="login__text">비밀번호</span>
          <input class="login__input" id="login-password" type="password" />
        </label>
        <div>
          <a class="login__text" href="">회원가입</a>
          <a class="login__text" href="">아이디 / 비밀번호 찾기</a>
        </div>
        <input class="login__btn" type="submit" value="로그인" />
      </form>
      <button class="login__btn login__btn--naver">네이버 로그인</button>
    </div>

    <!--------------- -->
    <script
      src="https://kit.fontawesome.com/d3a05df928.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
